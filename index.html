<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenTable Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
      url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1600&auto=format&fit=crop') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .card{
      width:420px;
      background:#fff;
      border-radius:28px;
      padding:45px 38px;
      box-shadow:0 20px 60px rgba(0,0,0,0.25);
      position:relative;
      overflow:hidden;
      animation:fade 0.5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(15px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      display:flex;
      justify-content:center;
      margin-bottom:35px;
    }

    .logo img{
      width:72px;
      height:72px;
      border-radius:50%;
      object-fit:cover;
    }

    h1{
      text-align:center;
      font-size:28px;
      margin-bottom:10px;
      color:#111;
    }

    .subtitle{
      text-align:center;
      color:#666;
      font-size:15px;
      line-height:1.6;
      margin-bottom:35px;
    }

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:600;
      color:#222;
    }

    .input-group input{
      width:100%;
      padding:16px;
      border:1px solid #ddd;
      border-radius:14px;
      outline:none;
      font-size:15px;
      transition:0.25s;
    }

    .input-group input:focus{
      border-color:#da3743;
      box-shadow:0 0 0 4px rgba(218,55,67,0.12);
    }

    .btn{
      width:100%;
      background:#da3743;
      color:#fff;
      border:none;
      padding:16px;
      border-radius:14px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.25s;
    }

    .btn:hover{
      background:#c72f3b;
      transform:translateY(-1px);
    }

    .otp-screen{
      display:none;
    }

    .back{
      text-align:center;
      margin-top:22px;
      color:#da3743;
      font-size:14px;
      cursor:pointer;
      font-weight:600;
    }

    .footer{
      margin-top:35px;
      text-align:center;
      color:#888;
      font-size:13px;
      line-height:1.6;
    }

    @media(max-width:500px){

      .card{
        width:92%;
        padding:38px 25px;
      }

      h1{
        font-size:24px;
      }
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- OpenTable Round Logo -->
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/OpenTable_logo.svg/512px-OpenTable_logo.svg.png" alt="OpenTable">
    </div>

    <!-- EMAIL SCREEN -->
    <div id="emailScreen">

      <h1>Sign in</h1>

      <p class="subtitle">
        Continue to your OpenTable account
      </p>

      <div class="input-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <button class="btn" onclick="nextStep()">
        Next
      </button>

    </div>

    <!-- OTP SCREEN -->
    <div class="otp-screen" id="otpScreen">

      <h1>Verify OTP</h1>

      <p class="subtitle">
        Enter the verification code sent to your email
      </p>

      <div class="input-group">
        <label>One-time password</label>
        <input type="text" maxlength="6" placeholder="Enter OTP">
      </div>

      <button class="btn">
        Submit
      </button>

      <div class="back" onclick="goBack()">
        ← Change email
      </div>

    </div>

    <div class="footer">
      By continuing, you agree to OpenTable’s Terms of Use and Privacy Policy.
    </div>

  </div>

  <script>

    function nextStep(){

      let email = document.getElementById("email").value;

      if(email.trim() === ""){
        alert("Please enter your email");
        return;
      }

      document.getElementById("emailScreen").style.display = "none";
      document.getElementById("otpScreen").style.display = "block";
    }

    function goBack(){

      document.getElementById("otpScreen").style.display = "none";
      document.getElementById("emailScreen").style.display = "block";
    }

  </script>

</body>
</html>
